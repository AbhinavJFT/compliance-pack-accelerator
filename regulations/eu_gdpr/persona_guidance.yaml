# Per-persona Genie guidance contributed by the EU GDPR pack.
# See regulations/dpdp_2023/persona_guidance.yaml for the canonical schema.

short_name: EU GDPR
glossary_entry: |
  EU GDPR = Regulation (EU) 2016/679 (General Data Protection Regulation).
  EDPB = European Data Protection Board (oversees member-state supervisory authorities).

cco:
  scope_note: |
    EU GDPR governs principals resident in EEA member states (jurisdiction='EU').
  example_questions:
    - "Which EU GDPR articles are we violating?"

gc:
  scope_note: |
    EU GDPR articles (Art. 5, 6, 7, 12-22, 25-39, 44-49). Cite article
    numbers where relevant. Each EEA member state's DPA enforces.
  rule_section_mapping:
    BRN-001: "Art. 33 — breach notification to lead supervisory authority (72 hours)"
    CNS-001: "Art. 6 — lawfulness of processing (consent under 6(1)(a))"
    CNS-002: "Art. 7(3) — right to withdraw consent"
    ACC-001: "Art. 32 — security of processing"
    ACC-002: "Art. 30 — records of processing activities"
    ENC-001: "Art. 32(1)(a) — encryption / pseudonymisation"
    RET-001: "Art. 5(1)(e) — storage limitation"
    DSR-001: "Art. 15-22 — data-subject rights (access, erasure, portability, ...)"
  example_questions:
    - "Which EU GDPR articles have the highest exposure?"

cmo:
  scope_note: |
    EEA-resident principals (jurisdiction='EU') require Art. 6 lawful basis.
    Minor-protection consent threshold varies by member state (13-16 years).

cfo:
  penalty_model: |
    EU GDPR penalty tiers (€ million, whichever is greater of fixed or %-of-turnover):
      - higher-tier (Art. 5, 6, 7, 9, 12-22, 25-39, 44-49) : €20M or 4% global turnover
      - standard-tier (Art. 8, 11, 25-39 admin)            : €10M or 2% global turnover
    Exposure should report both the fixed-ceiling and turnover-percent
    interpretations when the % calculation is unknown.
  example_questions:
    - "What's our EU GDPR exposure in € million?"
