# Per-persona Genie guidance contributed by the UK GDPR pack.
# See regulations/README.md for the canonical persona_guidance.yaml schema.

short_name: UK GDPR
glossary_entry: |
  UK GDPR = UK General Data Protection Regulation (UK GDPR) + Data Protection Act 2018.
  ICO = Information Commissioner's Office (UK supervising authority).

cco:
  scope_note: |
    UK GDPR governs principals in Great Britain (jurisdiction='GB').
  example_questions:
    - "Which UK GDPR articles are we violating the most?"

gc:
  scope_note: |
    UK GDPR articles (Art. 5, 6, 7, 12-22, 25-39, 44-49). Cite article
    numbers (e.g. Art. 6, Art. 33) where relevant.
  rule_section_mapping:
    BRN-001: "Art. 33 — breach notification to ICO within 72 hours"
    CNS-001: "Art. 6 — lawful basis (consent)"
    CNS-002: "Art. 7 — conditions for consent (withdrawal)"
    ACC-001: "Art. 32 — security of processing"
    ACC-002: "Art. 30 — records of processing activities"
    ENC-001: "Art. 32 — encryption (technical safeguard)"
    RET-001: "Art. 5(1)(e) — storage limitation"
    DSR-001: "Art. 15-22 — data-subject rights"
  example_questions:
    - "Which UK GDPR articles have the highest exposure?"

cmo:
  scope_note: |
    UK-resident principals (jurisdiction='GB') require Art. 6 lawful basis
    (typically consent under Art. 6(1)(a) or legitimate interest under
    Art. 6(1)(f) — minor-protection threshold is 13 years per DPA 2018 §9).

cfo:
  penalty_model: |
    UK GDPR penalty tiers (£ million, whichever is greater of fixed or %-of-turnover):
      - higher-tier (Art. 5, 6, 7, 9, 12-22, 25-39, 44-49) : £17.5M or 4% global turnover
      - standard-tier (Art. 8, 11, 25-39 admin)            : £8.7M  or 2% global turnover
    Exposure should report both the fixed-ceiling and turnover-percent
    interpretations when the % calculation is unknown.
  example_questions:
    - "What's our UK GDPR exposure in £ million?"
