# Per-persona Genie guidance contributed by the DPDP 2023 pack.
#
# Each top-level key (cco / gc / cmo / cfo) is merged into that persona's
# composed text_instructions ONLY when this pack is loaded. Personas not
# listed here receive nothing from this pack except the glossary entry
# (composer adds glossary unconditionally).
#
# The composer that consumes this file lives in
# governance_core/genie_instructions.py:compose_for_persona().

short_name: DPDP
glossary_entry: |
  DPDP = Digital Personal Data Protection Act 2023 (India).
  DPBI = Data Protection Board of India.

cco:
  scope_note: |
    India's DPDP Act 2023 governs Indian principals (jurisdiction='IN').
  example_questions:
    - "Which DPDP rules are we violating the most?"
    - "Show me critical DPDP gaps on Indian principals."

gc:
  scope_note: |
    DPDP Act sections and obligations (§5, §6, §7, §8, §10, §11-14, §18, §33).
    Cite section numbers (e.g. §5, §8, §11) where relevant.
  # rule_id -> "§X — short description" — used by composer to build the
  # rule-to-section glossary in the GC's prompt.
  rule_section_mapping:
    BRN-001: "§8(6) — 72-hour breach notification to DPBI"
    CNS-001: "§6 — consent for processing"
    CNS-002: "§7 — consent withdrawal mechanism"
    ACC-001: "§8 — access control"
    ACC-002: "§8 — audit logging"
    ENC-001: "§8 — encryption at rest"
    RET-001: "§8(7) — retention policy"
    DSR-001: "§11–14 — data principal rights"
  example_questions:
    - "Which DPDP sections are we violating, and how badly?"

cmo:
  scope_note: |
    DPDP-governed Indian principals (jurisdiction='IN') require explicit
    opt-in consent under §6. Track grant/withdrawal events; do not assume
    consent.

cfo:
  # Penalty model — short string suitable for inlining in the CFO's prompt
  # below the "Penalty model" header. Keep concise; the agent uses it as
  # ground truth for ₹-denominated estimates.
  penalty_model: |
    DPDP Act penalty ceilings per open gap (₹ crore):
      - critical : 250 (failure to take reasonable security safeguards)
      - high     : 150 (failure to fulfil Significant Data Fiduciary obligations)
      - medium   : 50  (catch-all for other Act/Rules breaches)
      - low      : 5
  example_questions:
    - "What is our total DPDP penalty exposure in ₹ crore?"
    - "Which DPDP gaps cost us the most if unremediated?"
