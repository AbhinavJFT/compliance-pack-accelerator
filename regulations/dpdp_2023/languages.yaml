    script: Bengali
    speakers_l1_millions: 100
    model_support_tier: strong
    human_review_required: false
    seeded_by_poc: false

  - code: te-IN
    script: Telugu
    speakers_l1_millions: 85
    model_support_tier: strong
    human_review_required: false
    seeded_by_poc: false

  - code: mr-IN
    script: Devanagari
    speakers_l1_millions: 90
    model_support_tier: strong
    human_review_required: false
    seeded_by_poc: false

  - code: gu-IN
    script: Gujarati
    speakers_l1_millions: 60
    model_support_tier: strong
    human_review_required: false
    seeded_by_poc: false

  - code: kn-IN
    script: Kannada
