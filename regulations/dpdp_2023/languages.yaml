# DPDP India 2023 — Languages covered by this pack's notice generator.
#
# The 8th Schedule of the Indian Constitution lists 22 official languages.
# The POC item #4 (10-language notice generator) covers the 10 with strong
# databricks-gpt-oss-120b support; the remaining 12 are listed here with
# human_review_required=true so a future production deployment can extend
# coverage via human translators.
#
# Phase 0 skeleton: when item #4 lands, scripts/generate_multilang_notices.py
# reads this file via pack_loader and loops over each language entry.
#
# Fields:
#   code                    — ISO 639-1 + ISO 3166 region (hi-IN, bn-IN, ...)
#   script                  — Unicode script name (Devanagari, Bengali, Latin, ...)
#   speakers_l1_millions    — approximate L1 speaker population (sanity check)
#   model_support_tier      — strong / good / fair / unsupported
#   human_review_required   — true for low-resource languages
#   seeded_by_poc           — true if this locale is populated in the current POC

languages:
  # ---- POC-seeded (currently in phase1_bootstrap.py) ----
  - code: en-IN
    script: Latin
    speakers_l1_millions: 130         # including L2
    model_support_tier: strong
    human_review_required: false
    seeded_by_poc: true
    notes: "Enterprise default; English as administrative language."

  - code: hi-IN
    script: Devanagari
    speakers_l1_millions: 610
    model_support_tier: strong
    human_review_required: false
    seeded_by_poc: true

  - code: ta-IN
    script: Tamil
    speakers_l1_millions: 75
    model_support_tier: strong
    human_review_required: false
    seeded_by_poc: true

  # ---- POC item #4 target (to be generated) ----
