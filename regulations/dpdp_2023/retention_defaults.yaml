# DPDP India 2023 — Retention defaults per consent purpose.
#
# DPDP §8(7) requires deletion "without undue delay" after the purpose is served.
# No fixed limit in the Act; the values below are POC defaults that approximate
# industry norms and can be overridden per deployment.
#
# Phase 0 skeleton: the current POC uses a single scalar retention_duration_days = 730
# for every event in pipelines/phase1_bootstrap.py:~610. This file introduces per-
# purpose resolution so different marketing vs. analytics vs. core-service retention
# is possible.
#
# Consumers: the consent-event generator in phase1_bootstrap and the enforcement
# job in pipelines/retention_enforcement.py both read this table via pack_loader.

defaults:
  core_service:              365      # 1 year — minimum to keep active account data
  marketing_email:           730      # 2 years — industry norm, principal may withdraw earlier
  marketing_sms:             730
  product_personalization:   365
  analytics:                 730
  third_party_sharing:       365      # Shortest — third-party consent typically shorter

# Statutory overrides — retention mandated by a different law supersedes the above.
# Consumers of retention_enforcement must honour these before deleting.
statutory_overrides:
  - purpose: core_service
    applies_to_tables: ["silver.transactions_tagged"]
    duration_days: 2555                       # 7 years (Banking Regulation Act, 1949)
    statute: "Banking Regulation Act, 1949"
  - purpose: core_service
    applies_to_tables: ["silver.patients_tagged"]
    duration_days: 1825                       # 5 years (Clinical Establishments Act)
    statute: "Clinical Establishments (Registration and Regulation) Act, 2010"
