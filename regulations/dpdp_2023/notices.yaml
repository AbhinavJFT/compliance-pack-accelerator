# DPDP India 2023 — Consent notices seeded into compliance.notice_versions.
#
# Each entry becomes one row in the notice_versions Delta table at bootstrap.
# The 3 bodies below are hand-authored (en-IN original + Hindi / Tamil legal
# translations). Item #4 in the §5.1 roadmap adds a 10-language auto-generator
# via Agent Bricks; those generated notices land as additional entries here
# with an explicit `machine_translated: true` marker for review workflow.
#
# Schema (maps to compliance.notice_versions columns):
#   notice_version_id   — primary key (stable across reruns)
#   notice_id           — logical notice identity (shared across languages)
#   version_number      — int, incremented on legal edits
#   language            — ISO 639-1 + ISO 3166 region code
#   legal_basis         — consent | contractual_necessity | legitimate_interest
#   purposes_covered    — list of consent purposes (must match consent_events_log.purpose values)
#   effective_from      — ISO 8601 datetime (UTC)
#   effective_to        — null until retired
#   approved_by         — DPO contact email
#   created_at          — ISO 8601 datetime (UTC)
#   notice_text         — verbatim body shown to data principals

default_purposes_covered: &default_purposes
  - core_service
  - marketing_email
  - marketing_sms
  - analytics
  - third_party_sharing
  - product_personalization

default_effective_from: &default_effective_from "2026-01-01T00:00:00+00:00"
default_created_at:     &default_created_at     "2026-01-01T00:00:00+00:00"
default_approved_by:    &default_approved_by    "dpo@example.com"

notices:
  - notice_version_id: "nv_marketing_v1_en-IN"
    notice_id: marketing_notice
    version_number: 1
    language: en-IN
    legal_basis: consent
    purposes_covered: *default_purposes
    effective_from: *default_effective_from
    effective_to: null
    approved_by: *default_approved_by
    created_at: *default_created_at
    notice_text: |-
      We collect and process your personal data for the following purposes:

      1. Core service delivery (contractual necessity)
      2. Marketing communications via email (requires your consent)
      3. Marketing communications via SMS (requires your consent)
      4. Product usage analytics (requires your consent)
      5. Sharing with third parties for their marketing (requires your consent)
      6. Product personalization based on your behavior (requires your consent)

      You may withdraw consent at any time via account settings or by contacting our DPO.
      For questions or rights requests, contact dpo@example.com.

      This notice complies with the Digital Personal Data Protection Act 2023.

  - notice_version_id: "nv_marketing_v1_hi-IN"
    notice_id: marketing_notice
    version_number: 1
    language: hi-IN
    legal_basis: consent
    purposes_covered: *default_purposes
    effective_from: *default_effective_from
    effective_to: null
    approved_by: *default_approved_by
    created_at: *default_created_at
    notice_text: |-
      हम निम्नलिखित उद्देश्यों के लिए आपके व्यक्तिगत डेटा को एकत्रित और संसाधित करते हैं:

      1. मूल सेवा वितरण (संविदात्मक आवश्यकता)
      2. ईमेल के माध्यम से विपणन संचार (आपकी सहमति आवश्यक)
      3. एसएमएस के माध्यम से विपणन संचार (आपकी सहमति आवश्यक)
      4. उत्पाद उपयोग विश्लेषण (आपकी सहमति आवश्यक)
      5. तीसरे पक्ष के साथ विपणन के लिए साझाकरण (आपकी सहमति आवश्यक)
      6. आपके व्यवहार पर आधारित उत्पाद वैयक्तिकरण (आपकी सहमति आवश्यक)

      आप खाता सेटिंग्स के माध्यम से या हमारे DPO से संपर्क करके किसी भी समय सहमति वापस ले सकते हैं।
      यह नोटिस डिजिटल व्यक्तिगत डेटा संरक्षण अधिनियम 2023 का अनुपालन करता है।

  - notice_version_id: "nv_marketing_v1_ta-IN"
    notice_id: marketing_notice
    version_number: 1
    language: ta-IN
    legal_basis: consent
    purposes_covered: *default_purposes
    effective_from: *default_effective_from
    effective_to: null
    approved_by: *default_approved_by
    created_at: *default_created_at
    notice_text: |-
      பின்வரும் நோக்கங்களுக்காக உங்கள் தனிப்பட்ட தரவை நாங்கள் சேகரிக்கிறோம் மற்றும் செயலாக்குகிறோம்:

      1. அடிப்படை சேவை வழங்கல் (ஒப்பந்த அவசியம்)
      2. மின்னஞ்சல் வழியாக சந்தைப்படுத்தல் தகவல்தொடர்பு (உங்கள் ஒப்புதல் தேவை)
      3. SMS வழியாக சந்தைப்படுத்தல் தகவல்தொடர்பு (உங்கள் ஒப்புதல் தேவை)
      4. தயாரிப்பு பயன்பாட்டு பகுப்பாய்வு (உங்கள் ஒப்புதல் தேவை)
      5. மூன்றாம் தரப்பினருடன் சந்தைப்படுத்தலுக்கான பகிர்வு (உங்கள் ஒப்புதல் தேவை)
      6. உங்கள் நடத்தையின் அடிப்படையில் தயாரிப்பு தனிப்பயனாக்கல் (உங்கள் ஒப்புதல் தேவை)

      கணக்கு அமைப்புகள் வழியாக அல்லது எங்கள் DPO-ஐ தொடர்பு கொள்வதன் மூலம் எப்போது வேண்டுமானாலும் ஒப்புதலை திரும்பப் பெறலாம்।
      இந்த அறிவிப்பு டிஜிட்டல் தனிப்பட்ட தரவு பாதுகாப்பு சட்டம் 2023-க்கு இணங்குகிறது।

# Also declared on the pack (default purposes list that seeds consent_events
# generator in phase1_bootstrap's §6). Keeping a single source of truth here
# so a pack author can update purposes in one place.
default_purposes: *default_purposes
