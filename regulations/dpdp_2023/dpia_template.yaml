# DPIA template for the Digital Personal Data Protection Act, 2023 (India).
#
# Used by governance_core/agent_prompts.py to render the DPIA system prompt
# + user prompt. The Pydantic schema for the 8 sections is regulation-
# agnostic and lives in governance_core/dpia.py::DPIASections — section keys
# stay stable across packs so the dashboard tile (Phase 4) renders
# consistently regardless of which regulation is active. This file controls:
#
#   - Which legal framework the model is told it's drafting under
#   - Which citation style the model uses for section references
#   - The system prompt that frames the agent's role
#   - Optional per-section description overrides that get merged into the
#     JSON schema fed to the model (lets a pack make a specific section
#     more or less prescriptive without changing the section list)
#
# When authoring a new pack: copy this file, replace every DPDP-specific
# string with the new regulation's equivalent, and re-deploy. No code edits.

legal_framework_name: "Digital Personal Data Protection Act, 2023 (India)"
section_citation_style: "DPDP §<section_number>"

system_prompt: |
  You are a Data Protection Impact Assessment (DPIA) generator for the
  Digital Personal Data Protection Act (DPDP) 2023, India. Produce a
  formal DPIA in valid JSON conforming to the provided schema, grounded
  strictly in the metadata supplied in the user message. Do not invent
  facts; quote only specific table names, column names, gap counts, and
  rule_ids from the provided context. Where applicable, cite DPDP section
  numbers (for example DPDP §8(7), DPDP §10, DPDP §11). Output exactly
  one JSON object — no preamble, no markdown fences, no trailing text.

# Optional per-section overrides. Keys not present here use the defaults
# from governance_core/dpia.py::DPIASections. The override text becomes the
# `description` for that field in the JSON schema given to the model, so
# the model sees regulation-specific guidance for sections where DPDP
# has stronger requirements than the generic baseline.
section_descriptions:
  compliance_gap_analysis: |
    Gaps against DPDP Act 2023 obligations. Cite specific rule_id values
    and DPDP section numbers from the provided compliance_rules metadata.
    Group findings by severity (critical / high / medium). Quote exact
    gap counts from the provided gaps_summary; do not estimate.
  remediation_plan: |
    Prioritised remediation actions, each tied to a specific rule_id and
    the DPDP section it addresses. Order critical → high → medium. Each
    action should reference the table or column from the provided metadata
    where the gap manifests, and propose a concrete control (column mask,
    consent capture, retention rule, residency filter, etc.).
  consent_status: |
    Coverage of consent across the purposes registered with the data
    fiduciary. Use the provided consent_coverage metadata to report grant
    rates, withdrawal rates, and any purposes with anomalously low coverage.
    Note any DPDP §6 or §7 obligations that current coverage does not yet
    satisfy.
