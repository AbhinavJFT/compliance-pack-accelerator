# DPDP India 2023 — Personal-data breach notification SLA (§8(6)).
#
# DPDP §8(6) obligates the Data Fiduciary to notify "in such form and manner
# as may be prescribed" — the 2025 DPDP Rules pin this at 72 hours to the DPBI
# plus notification to affected principals "without undue delay". Severe breaches
# additionally trigger CERT-In notification under a separate 6-hour SLA
# (CERT-In 2022 Directive).
#
# Phase 0 skeleton: no code reads this file today — the breach-response workflow
# (scripts/breach_notify.py) is queued for Phase 2+. This file establishes the
# pack contract so Phase 1 UK GDPR / CCPA packs have a clear template.

notification:
  # Primary regulator deadline
  to_authority:
    authority: "Data Protection Board of India (DPBI)"
    deadline_hours: 72
    mandatory: true
    channel: "portal.dpbi.gov.in or designated email"
    content_requirements:
      - description_of_breach
      - categories_and_approx_number_of_principals
      - dpo_or_contact_point
      - likely_consequences
      - measures_taken_or_proposed

  # Data-subject notification
  to_principals:
    deadline: "without undue delay"
    mandatory_when: "likely to result in high risk to rights"
    channel: "any reasonable channel — email / SMS / in-app / letter"
    content_requirements:
      - description_in_plain_language
      - dpo_contact
      - likely_consequences
      - measures_taken_or_proposed

  # Sectoral overrides (India)
  sectoral_overrides:
    - authority: "CERT-In"
      applies_to: "any cyber-incident — broader than 'personal data breach'"
      deadline_hours: 6
      statute: "CERT-In Directive, April 2022"
