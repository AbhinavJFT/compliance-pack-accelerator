# DPDP India 2023 — Cross-border data transfer controls (§16).
#
# §16 authorises cross-border transfer to countries NOT on a government-notified
# negative list ("restricted"). As of 2026-Q2, no negative list has been notified,
# so DPDP is effectively permissive at the statute level — but most enterprises
# choose to restrict to India + a short whitelist for operational clarity.
#
# Phase 0 skeleton: the current residency UDF in schemas/residency_filter.sql
# hardcodes `country = 'India'`. Once the pack loader lands, the filter UDF is
# re-generated per-pack from this config.

# Countries where cross-border transfer is permitted WITHOUT additional controls.
# Default is the restrictive POC posture (India only) — uncomment to broaden.
allowed_countries:
  - India

# Countries with sectoral restrictions (e.g. health / financial data carve-outs
# from RBI or CERT-In). Not used by the UDF today; placeholder for future
# category-aware filtering.
restricted_countries_by_sector: []

# Countries explicitly blocked by §16 negative list — populate when the Central
# Government notifies it. Until then, empty.
blocked_countries: []

# Residency filter target — which Silver tables carry the country column and
# should have the UDF applied. Table names are RELATIVE to the active catalog
# (phase1_bootstrap prepends {CATALOG} at render time), so switching packs or
# renaming the catalog doesn't require editing this file.
apply_filter_to:
  - table: silver.employees_tagged
    column: country

# Consumers: phase1_bootstrap §8 constructs the residency_filter UDF body
# from `allowed_countries` above and issues ALTER TABLE ... SET ROW FILTER
# for each `apply_filter_to` entry. Switching packs = yaml change only.
